format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 5
truncate_to_repo = false
style = 'bold blue'

[git_branch]
format = '[$branch]($style) '
style = 'bold cyan'

[git_status]
format = '[$all_status$ahead_behind]($style) '
style = 'bold red'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
